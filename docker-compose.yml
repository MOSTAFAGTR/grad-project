version: '3.8'

networks:
  scale_net:
    name: scale_net
    driver: bridge

services:
  # 1. SANDBOX BUILDER
  sandbox_base:
    build: 
      context: ./backend/sandbox_base
    image: scale-sandbox-base
    container_name: scale_sandbox_builder
    command: ["echo", "Sandbox Base Image Built Successfully"]
    networks:
      - scale_net

  # 2. MAIN BACKEND API
  backend:
    build: ./backend
    container_name: scale_application-backend-1
    restart: on-failure 
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
      # --- MOUNT CHALLENGE FOLDERS ---
      - ./challenge-sql-injection:/app/challenge-sql-injection
      - ./challenge-xss:/app/challenge-xss
      - ./challenge-csrf:/app/challenge-csrf  # <--- NEW MAPPING
    networks:
      - scale_net
    depends_on:
      - main_db
      - challenge_db_sqli
      - challenge_db_csrf # Wait for CSRF DB
      - sandbox_base
    command: ["sh", "-c", "python seed_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  # 3. FRONTEND
  frontend:
    build: ./frontend
    container_name: scale_application-frontend-1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - scale_net
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=http://localhost:8000

  # 4. AI SERVICE
  ai_service:
    build: ./ai_service
    container_name: scale_application-ai_service-1
    ports:
      - "8001:8001"
    volumes:
      - ./ai_service:/app
    networks:
      - scale_net
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  # 5. MAIN DATABASE (App Data)
  main_db:
    image: mysql:8.0
    container_name: main_db
    environment:
      - MYSQL_DATABASE=scale_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - scale_db_data:/var/lib/mysql
      - ./db_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - scale_net
    ports:
      - "3306:3306"

  # 6. SQL INJECTION DATABASE
  challenge_db_sqli:
    image: mysql:8.0
    container_name: challenge_db_sqli
    environment:
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - ./challenge-sql-injection/users.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - scale_net

  # 7. CSRF CHALLENGE DATABASE (NEW EXTERNAL DB)
  challenge_db_csrf:
    image: mysql:8.0
    container_name: challenge_db_csrf
    environment:
      - MYSQL_DATABASE=csrfdb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      # Mount the new SQL file here
      - ./challenge-csrf/csrf.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3308:3306"
    networks:
      - scale_net

volumes:
  scale_db_data: